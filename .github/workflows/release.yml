name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      
      - name: Install dependencies
        working-directory: desktop
        run: npm ci --omit=optional
        env:
          npm_config_ignore_scripts: true
      
      - name: Build Windows
        working-directory: desktop
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            desktop/release/*.exe
            desktop/release/*.zip
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      
      - name: Install dependencies
        working-directory: desktop
        run: npm ci --omit=optional
        env:
          npm_config_ignore_scripts: true
      
      - name: Build macOS
        working-directory: desktop
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      
      - name: Install dependencies
        working-directory: desktop
        run: npm ci --omit=optional
        env:
          npm_config_ignore_scripts: true
      
      - name: Build Linux
        working-directory: desktop
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
          if-no-files-found: warn

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: find artifacts -type f -name "*" | head -50
      
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Open Worship ${{ steps.version.outputs.version }}
          body: |
            ## Downloads
            
            | Platform | Download |
            |----------|----------|
            | Windows | `Open-Worship-Setup-*.exe` (installer) or `.zip` (portable) |
            | macOS | `Open-Worship-*.dmg` |
            | Linux | `Open-Worship-*.AppImage` or `.deb` |
            
            ## What's New
            
            See commit history for changes.
            
            ## Installation
            
            **Windows:** Run the `.exe` installer or extract the `.zip` for portable mode.
            
            **macOS:** Open the `.dmg` and drag Open Worship to Applications.
            
            **Linux:** Make the `.AppImage` executable (`chmod +x`) and run it, or install the `.deb` with `sudo dpkg -i`.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
